<mat-sidenav-container class="shell-container">
  <mat-sidenav #drawer class="shell-sidenav" [mode]="sidenavMode()" [opened]="sidenavOpened()">
    <div class="brand-block">
      <span class="material-symbols-outlined">construction</span>
      <div>
        <strong>Dev Tools</strong>
        <p>Utilitários para desenvolvimento</p>
      </div>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          (click)="isMobile() && isSidenavOpen.set(false)">
          <span matListItemIcon class="material-symbols-outlined">{{ item.icon }}</span>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar class="shell-toolbar">
      <button mat-icon-button type="button" (click)="toggleSidenav()" aria-label="Abrir menu lateral">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <span class="toolbar-title">Dev Tools</span>
      <span class="toolbar-spacer"></span>

      <mat-slide-toggle [checked]="isDarkMode()" (change)="toggleTheme()">
        Modo escuro
      </mat-slide-toggle>
    </mat-toolbar>

    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
