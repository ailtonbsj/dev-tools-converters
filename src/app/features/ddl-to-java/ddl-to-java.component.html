<section class="ddl-layout">
  <mat-card class="converter-card">
    <mat-card-header>
      <mat-card-title style="margin: 5px 0;">DDL para Java</mat-card-title>
      <mat-card-subtitle style="margin: 5px 0;">Converta comandos CREATE TABLE em objetos Java.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="conversion-toolbar">
        <mat-form-field appearance="outline">
          <mat-label>Dialeto SQL</mat-label>
          <mat-select [ngModel]="dialect()" (ngModelChange)="dialect.set($event)">
            <mat-option value="postgresql">PostgreSQL</mat-option>
            <mat-option value="oracle">Oracle</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Código gerado</mat-label>
          <mat-select [ngModel]="generatedCodeType()" (ngModelChange)="generatedCodeType.set($event)">
            <mat-option value="jpaEntity">Entidade JPA</mat-option>
            <mat-option value="mybatisEntity">Entidade MyBatis</mat-option>
            <mat-option value="mybatisDAO">DAO MyBatis</mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-raised-button color="primary" type="button" (click)="convertTo()">
          <span class="button-content">
            <span class="material-symbols-outlined">auto_fix_high</span>
            <span>Conveter</span>
          </span>
        </button>
      </div>

      <div class="panes">
        <section class="editor-pane">
          <div class="pane-toolbar pane-toolbar-left">
            <h2>SQL de entrada</h2>
            <button mat-stroked-button type="button" (click)="pasteFromClipboard()">
              <span class="button-content">
                <span class="material-symbols-outlined">content_paste</span>
                <span>Colar código</span>
              </span>
            </button>
          </div>

          <div class="code-editor" aria-label="Editor SQL">
            <pre class="highlight-layer" [innerHTML]="highlightedSql()"></pre>
            <textarea
              [ngModel]="ddlInput()"
              (ngModelChange)="onSqlInput($event)"
              spellcheck="false"
              aria-label="Texto SQL"></textarea>
          </div>
        </section>

        <section class="editor-pane">
          <div class="pane-toolbar pane-toolbar-right">
            <h2>Entidade JPA gerada</h2>
            <button mat-stroked-button type="button" (click)="copyGeneratedCode()" [disabled]="!generatedEntity()">
              <span class="button-content">
                <span class="material-symbols-outlined">content_copy</span>
                <span>Copiar código</span>
              </span>
            </button>
          </div>

          <div class="code-editor output-editor" aria-label="Código Java gerado">
            <pre class="highlight-layer" [innerHTML]="highlightedJava()"></pre>
            <textarea [value]="generatedEntity()" readonly spellcheck="false" aria-label="Código Java"></textarea>
          </div>
        </section>
      </div>
    </mat-card-content>
  </mat-card>
</section>
